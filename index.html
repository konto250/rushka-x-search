<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ルーシュカ Xエゴサビルダー</title>
    <meta name="description" content="ルーシュカ関連のX検索式を作成して、コピーまたはXで直接検索できる静的アプリです。" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:title" content="ルーシュカ Xエゴサビルダー" />
    <meta property="og:description" content="ルーシュカ関連のX検索式を作成して、コピーまたはXで直接検索できる静的アプリです。" />
    <meta property="og:image" content="./img/ogp/rushka.jpg" />
    <meta property="og:image:alt" content="ルーシュカのイメージ画像" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ルーシュカ Xエゴサビルダー" />
    <meta name="twitter:description" content="ルーシュカ関連のX検索式を作成して、コピーまたはXで直接検索できる静的アプリです。" />
    <meta name="twitter:image" content="./img/ogp/rushka.jpg" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <a class="repo-link-wrap" href="https://github.com/konto250/rushka-x-search" target="_blank"
        rel="noopener noreferrer" aria-label="GitHubでリポジトリを開く">
        <span class="repo-link-label">GitHub</span>
        <svg class="repo-link-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3z"></path>
            <path d="M5 5h6v2H7v10h10v-4h2v6H5V5z"></path>
        </svg>
    </a>
    <main class="container">
        <h1>ルーシュカ Xエゴサビルダー</h1>
        <p class="subtitle">Xの検索式を作成して、コピーまたはXで直接検索できます。</p>

        <section class="card">
            <h2>基本検索式</h2>
            <div class="readonly">(#ルーシュカ OR ルーシュカ)</div>
        </section>

        <section class="card">
            <h2>オプション</h2>
            <div class="options-grid">
                <div class="option-input-wrap">
                    <label><input type="checkbox" id="enableDateRange" checked /> 日付を指定する（`since:yyyy-mm-dd`）</label>
                    <label for="dateRange">検索期間</label>
                    <select id="dateRange">
                        <option value="1d">過去1日</option>
                        <option value="3d">過去3日</option>
                        <option value="7d" selected>過去1週間</option>
                        <option value="14d">過去2週間</option>
                        <option value="1m">過去1ヶ月</option>
                        <option value="2m">過去2ヶ月</option>
                    </select>
                    <small>本日を基準に開始日を計算して `since:yyyy-mm-dd` を追加します</small>
                </div>
                <label><input type="checkbox" id="mediaOnly" /> メディアのみ（`filter:media`）</label>
                <label><input type="checkbox" id="excludeQuote" /> 引用リツイートを除外（`-filter:quote`）</label>
                <label><input type="checkbox" id="excludeRetweet" /> リツイートを除外（`-filter:retweet`）</label>
                <label><input type="checkbox" id="excludeReplies" /> リプライを除外（`-filter:replies`）</label>
                <label><input type="checkbox" id="enableExcludeUsers" /> ユーザーを除外（`-from:user`）</label>
                <div id="excludeUsersWrap" class="option-input-wrap" aria-hidden="true">
                    <label for="excludeUsers">除外ユーザー（スペース区切り）</label>
                    <input id="excludeUsers" type="text" placeholder="user1 user2" autocomplete="off" disabled />
                    <small>例: `-from:user1 -from:user2` の形式で追加されます</small>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>生成された検索式</h2>
            <textarea id="queryOutput" readonly></textarea>
            <div class="button-row">
                <button id="copyButton" type="button">検索式をコピー</button>
                <a id="openXLink" href="#" target="_blank" rel="noopener noreferrer">Xで開く（最新）</a>
            </div>
            <p id="copyStatus" class="status" aria-live="polite"></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
